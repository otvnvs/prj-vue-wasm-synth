<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emscripten Waveform Generator</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 40px;
            max-width: 600px;
            margin: 0 auto;
        }
        button {
            padding: 12px 24px;
            font-size: 16px;
            margin-right: 10px;
            cursor: pointer;
        }
        #status {
            margin-top: 20px;
            color: #666;
            font-style: italic;
        }
    </style>
</head>
<body>

    <h1>Emscripten Waveform Generator</h1>
    <p>Click a button below to generate and play audio via WebAssembly.</p>
    
    <button id="playSine">Play Sine Wave</button>
    <button id="playSquare">Play Square Wave</button>
    
    <div id="status">Status: Waiting for WebAssembly...</div>

    <!-- 1. Load application logic as an ES Module -->
    <script type="module" src="main.js"></script>

    <!-- 2. Load Emscripten JavaScript compilation output -->
    <script async src="waveform.js"></script>

</body>
</html>
