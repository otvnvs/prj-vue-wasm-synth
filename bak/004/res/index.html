<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Modular Emscripten Synthesizer</title>
    <style>
        body { font-family: sans-serif; padding: 30px; max-width: 600px; margin: 0 auto; }
        .section { margin-bottom: 25px; padding: 20px; border: 1px solid #ccc; border-radius: 6px; }
        select, button, input[type="range"] { padding: 10px; font-size: 15px; margin-right: 10px; }
        .slider-container { display: flex; align-items: center; margin-top: 12px; }
        .status { margin-top: 10px; color: #555; font-style: italic; }
    </style>
</head>
<body>

    <h1>Modular Emscripten Synthesis Engine</h1>

    <!-- GENERATOR CONFIGURATION -->
    <div class="section">
        <h3>1. Oscillator Controls</h3>
        <label for="waveSelect">Waveform:</label>
        <select id="waveSelect">
            <option value="sine">Sine Wave Oscillator</option>
            <option value="square">Square Wave Oscillator</option>
            <option value="sawtooth">Sawtooth Wave Oscillator</option>
        </select>

        <!-- FREQUENCY SLIDER -->
        <div class="slider-container">
            <label for="freqSlider" style="min-width: 140px;">Frequency: <span id="freqVal">440</span> Hz</label>
            <input type="range" id="freqSlider" min="100" max="1500" step="1" value="440" style="width: 250px;">
        </div>

        <!-- NEW: VOLUME CONTROL SLIDER -->
        <div class="slider-container">
            <label for="volSlider" style="min-width: 140px;">Volume: <span id="volVal">50</span>%</label>
            <input type="range" id="volSlider" min="0" max="1" step="0.01" value="0.5" style="width: 250px;">
        </div>
    </div>

    <!-- FEATURE 1: STATIC BUFFER -->
    <div class="section">
        <h3>2. Static Buffer Action</h3>
        <button id="btnPlayBuffer">Play 2s Selected Buffer</button>
        <div id="status" class="status">Status: Mapping assets...</div>
    </div>

    <!-- FEATURE 2: LIVE STREAM -->
    <div class="section">
        <h3>3. Real-Time Streaming Action</h3>
        <button id="btnToggleStream">Toggle Continuous Stream</button>
        <div id="streamStatus" class="status">Live Stream: Offline</div>
    </div>

    <script type="module">
        import { handlePlayback, toggleLiveStream, setWaveformType, setFrequencyValue, setVolumeValue } from './main.js';

        document.getElementById('waveSelect').addEventListener('change', (e) => {
            setWaveformType(e.target.value);
        });

        // Frequency configuration hook
        document.getElementById('freqSlider').addEventListener('input', (e) => {
            document.getElementById('freqVal').innerText = e.target.value;
            setFrequencyValue(e.target.value);
        });

        // NEW: Volume slider input listener
        document.getElementById('volSlider').addEventListener('input', (e) => {
            const val = e.target.value;
            document.getElementById('volVal').innerText = Math.round(val * 100);
            setVolumeValue(val);
        });

        document.getElementById('btnPlayBuffer').addEventListener('click', () => handlePlayback());
        document.getElementById('btnToggleStream').addEventListener('click', () => toggleLiveStream());
    </script>

    <script async src="./waveform.js"></script>
</body>
</html>
