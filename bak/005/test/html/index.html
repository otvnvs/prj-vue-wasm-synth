<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Library Verification Suite (Vanilla Test)</title>
    <style>
        body { font-family: sans-serif; padding: 30px; max-width: 600px; margin: 0 auto; background: #fafafa; }
        .section { margin-bottom: 25px; padding: 20px; border: 1px solid #ddd; border-radius: 6px; background: #fff; }
        select, button, input[type="range"] { padding: 10px; font-size: 15px; margin-right: 10px; }
        .slider-container { display: flex; align-items: center; margin-top: 12px; }
        .status { margin-top: 10px; color: #666; font-style: italic; }
        button:disabled, select:disabled, input:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>

    <h1>Library Verification Suite</h1>
    <p>Tests the standalone packaged output module inside a clean, framework-free browser workspace.</p>

    <!-- STEP 1: INITIALIZATION ACTIVATOR -->
    <div class="section">
        <h3>1. Engine Life-Cycle Initialization</h3>
        <button id="btnLoadEngine">Instantiate & Mount Synth Engine</button>
        <div id="status" class="status">Status: Uninitialized (Click to mount class)</div>
    </div>

    <!-- STEP 2: OSCILLATOR ROUTING PARAMETERS -->
    <div class="section">
        <h3>2. Live Parametric Modulators</h3>
        <label for="waveSelect">Waveform Topology:</label>
        <select id="waveSelect" disabled>
            <option value="sine">Sine Wave Oscillator</option>
            <option value="square">Square Wave Oscillator</option>
            <option value="sawtooth">Sawtooth Wave Oscillator</option>
        </select>

        <div class="slider-container">
            <label for="freqSlider" style="min-width: 140px;">Pitch: <span id="freqVal">440</span> Hz</label>
            <input type="range" id="freqSlider" min="100" max="1500" step="1" value="440" style="width: 250px;" disabled>
        </div>

        <div class="slider-container">
            <label for="volSlider" style="min-width: 140px;">Gain: <span id="volVal">50</span>%</label>
            <input type="range" id="volSlider" min="0" max="1" step="0.01" value="0.5" style="width: 250px;" disabled>
        </div>
    </div>

    <!-- STEP 3: EXPERIMENTAL METRIC ASSAYS -->
    <div class="section">
        <h3>3. Execution Action Tests</h3>
        <button id="btnPlayBuffer" disabled>Play 2s Selected Buffer</button>
        <button id="btnToggleStream" disabled>Toggle Continuous Stream</button>
        <div id="streamStatus" class="status">Live Stream: Offline</div>
    </div>

    <!-- Main Module script connection -->
    <script type="module" src="./test-runner.js"></script>

</body>
</html>
